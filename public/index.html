<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Prompt Quality Analyzer</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
background:#f5f5f7;
color:#1d1d1f;
}

.container{
max-width:900px;
margin:auto;
padding:60px 20px;
}

.header{
margin-bottom:40px;
}

.title{
font-size:32px;
font-weight:600;
letter-spacing:-0.02em;
}

.subtitle{
margin-top:6px;
color:#6e6e73;
font-size:14px;
}

.card{
background:white;
border-radius:20px;
padding:32px;
box-shadow:0 20px 40px rgba(0,0,0,.06);
}

textarea{
width:100%;
height:130px;
border-radius:12px;
border:1px solid #d2d2d7;
padding:16px;
font-size:15px;
resize:none;
outline:none;
transition:.2s;
}

textarea:focus{
border-color:#0071e3;
box-shadow:0 0 0 3px rgba(0,113,227,.15);
}

.actions{
display:flex;
gap:12px;
align-items:center;
margin-top:16px;
}

button{
border:0;
border-radius:10px;
padding:10px 18px;
background:#0071e3;
color:white;
font-size:14px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#0062c4;
}

.score{
margin-left:auto;
font-size:14px;
color:#6e6e73;
}

.score span{
font-weight:600;
color:#1d1d1f;
}

table{
width:100%;
margin-top:28px;
border-collapse:collapse;
font-size:14px;
}

thead{
background:#f5f5f7;
}

th{
padding:12px;
text-align:left;
font-weight:600;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

.section{
margin-top:30px;
}

.section h3{
font-size:15px;
margin-bottom:10px;
font-weight:600;
}

pre{
background:#f5f5f7;
padding:16px;
border-radius:12px;
font-size:13px;
white-space:pre-wrap;
}

.optimized{
background:#eef5ff;
padding:18px;
border-radius:14px;
font-size:14px;
line-height:1.6;
white-space:pre-wrap;
}

.footer{
margin-top:50px;
text-align:center;
font-size:12px;
color:#86868b;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="title">Prompt Quality Analyzer</div>
<div class="subtitle">AI Prompt Evaluation Tool</div>
</div>

<div class="card">

<textarea id="prompt" placeholder="프롬프트를 입력하세요"></textarea>

<div class="actions">

<button id="analyzeBtn">Analyze</button>
<button id="optimizeBtn">Optimize</button>

<div class="score">
Total Score: <span id="total">-</span>
</div>

</div>

<table>

<thead>
<tr>
<th>항목</th>
<th>점수</th>
<th>코멘트</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="section">
<h3>Optimized Prompt</h3>
<div id="optimized" class="optimized"></div>
</div>

<div class="section">
<h3>Raw JSON</h3>
<pre id="raw"></pre>
</div>

</div>

<div class="footer">
AI Prompt Tool
</div>

</div>

<script src="./app.js" defer></script>

</body>
</html>
