<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prompt Quality Analyzer</title>
  <style>
    body { font-family: Arial; background:#f4f4f4; padding:40px; }
    .container { max-width: 900px; margin:auto; background:#fff; padding:24px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,.08); }
    textarea { width:100%; height:140px; padding:12px; font-size:14px; }
    button { padding:10px 16px; border:0; border-radius:8px; background:#111; color:#fff; cursor:pointer; }
    .row { display:flex; gap:12px; align-items:center; margin-top:12px; }
    pre { background:#f0f0f0; padding:12px; border-radius:8px; white-space:pre-wrap; }
    table { width:100%; border-collapse:collapse; margin-top:12px; }
    th, td { border-bottom:1px solid #eee; padding:10px; text-align:left; }
    .score { font-weight:700; font-size:18px; margin-left:auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Prompt Quality Analyzer (Step 1)</h1>

    <textarea id="prompt" placeholder="프롬프트 입력"></textarea>

    <div class="row">
      <button id="analyzeBtn">Analyze</button>
      <button id="optimizeBtn">Optimize</button>

      <div class="score">
        Total Score: <span id="total">-</span>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>항목</th>
          <th>점수</th>
          <th>코멘트</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <h3>Raw JSON</h3>
    <pre id="raw"></pre>

    <div class="section">
     <h3>Optimized Prompt</h3>
     <pre id="optimized"></pre>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
